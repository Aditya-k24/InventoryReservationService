spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/inventory_reservation}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: public
  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

app:
  expiry:
    interval-ms: 60000

springdoc:
  swagger-ui:
    path: /swagger-ui.html
